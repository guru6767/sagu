spring:
  application:
    name: starto-api
  datasource:
    url: jdbc:postgresql://localhost:5432/starto
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect   

  mail:
    host: smtp.gmail.com
    port: 587
    username: sagarghate164@gmail.com
    password: {password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            trust: smtp.gmail.com
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
    

logging:
  level:
    org.springframework.transaction: DEBUG
    org.hibernate.SQL: DEBUG

server:
  port: 8082
